name: Publish PokeClaw release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release bundle
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          ROOT="release-assets"
          DIR="$ROOT/PokeClaw"
          ZIP="PokeClaw-${TAG}.zip"

          rm -rf "$ROOT" "$ZIP"
          mkdir -p "$DIR"

          # Single cross-platform launcher (macOS/Linux/Windows) + server.
          cp README.md server.ts pokeclaw.js "$DIR/"
          # The landing page under website/ is intentionally excluded from the
          # release bundle — it is published via GitHub Pages, not shipped with
          # the runnable download.

          chmod +x "$DIR/pokeclaw.js"

          (cd "$ROOT" && zip -qr "../$ZIP" "PokeClaw")

          ls -lh "$ZIP"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PokeClaw ${{ github.ref_name }}
          body: Automated release for tag ${{ github.ref_name }}.
          append_body: true
          target_commitish: ${{ github.sha }}
          files: |
            PokeClaw-${{ github.ref_name }}.zip
