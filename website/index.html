<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0d12" />
    <title>PokeClaw</title>
    <meta name="description" content="PokeClaw — a minimal MCP server and native Mac app." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#top" aria-label="PokeClaw home">PokeClaw</a>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark and light mode">
        <span class="theme-toggle-dot" aria-hidden="true"></span>
        <span class="theme-toggle-label">Dark</span>
      </button>
    </header>

    <main id="top" class="page">
      <section class="hero">
        <p class="eyebrow">MCP server · native Mac app</p>
        <h1>PokeClaw.</h1>
        <p class="lede">Minimal control. Clean interface. Built for Mac.</p>
      </section>

      <section class="cards" aria-label="Features">
        <article class="card">
          <span class="card-label">MCP Server</span>
          <p>Simple. Connected. Fast.</p>
        </article>
        <article class="card">
          <span class="card-label">Native Mac App</span>
          <p>Quietly integrated with macOS.</p>
        </article>
        <article class="card">
          <span class="card-label">Designed for focus</span>
          <p>Whitespace first. Everything else later.</p>
        </article>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
